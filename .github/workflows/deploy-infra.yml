name: Deploy Infrastructure

# Manual only — infra doesn't come and go automatically. You decide when
# it exists, which is the whole point of the spin-up/spin-down cost model.
on:
  workflow_dispatch:
    inputs:
      action:
        description: "terraform action"
        required: true
        type: choice
        options: [apply, destroy]
        default: apply

permissions:
  id-token: write   # required for OIDC
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/environments/demo
    steps:
      - uses: actions/checkout@v4

      # No stored AWS keys — GitHub's OIDC token is exchanged for short-lived
      # credentials via a pre-configured IAM role trust policy.
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=us-east-1" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}"

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        if: ${{ inputs.action == 'apply' }}
        run: terraform apply -auto-approve tfplan

      - name: Terraform Destroy
        if: ${{ inputs.action == 'destroy' }}
        run: terraform destroy -auto-approve
