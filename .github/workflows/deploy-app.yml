name: Deploy Application

# Ships the Lambda collector code. The dashboard itself is NOT deployed
# here — Streamlit Community Cloud watches this repo directly and
# redeploys app/dashboard.py automatically on every push to main, so
# there's no build/push step needed for it.
on:
  push:
    branches: [main]
    paths:
      - "common/**"
      - "lambda/**"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy-lambda:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Build Lambda package
        run: |
          mkdir -p build
          pip install ./common -t build/
          pip install -r lambda/patch_collector/requirements.txt -t build/
          cp lambda/patch_collector/handler.py build/
          cd build && zip -r ../lambda.zip . && cd ..

      - name: Update Lambda code
        run: |
          aws lambda update-function-code \
            --function-name patch-dashboard-collector \
            --zip-file fileb://lambda.zip
